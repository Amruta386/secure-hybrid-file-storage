{% extends 'base.html' %}
{% block content %}

<h3>Enter Security Key to Decrypt</h3>

<div class="card p-4 shadow-sm">
    <p class="text-muted">Enter the security key to decrypt: <strong>{{ filename }}</strong></p>

    <form method="POST">
        <input type="password" name="security_key" class="form-control mb-3" placeholder="Enter security key" required>
        <button class="btn btn-success">Decrypt</button>
        <a href="/dashboard" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>

{% endblock %}
