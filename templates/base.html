<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Cloud Crypto System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .navbar {
            background: #343a40 !important;
        }
        .nav-link, .navbar-brand {
            color: #fff !important;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="/">Crypto System</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-3">
            <li class="nav-item"><a class="nav-link" href="/encrypt">Encrypt File</a></li>
            <li class="nav-item"><a class="nav-link" href="/decrypt">Decrypt File</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{category}}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
